name: Release

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  OPENWRT_VERSION: "24.10.6"
  OPENWRT_TARGET: mediatek/filogic
  OPENWRT_ARCH: aarch64_cortex-a53

jobs:
  linux:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config libsodium-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DEPN_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

      - name: Package Linux server
        run: |
          set -eux
          mkdir -p dist/epn-server-linux-x86_64/bin dist/epn-server-linux-x86_64/scripts
          cp build/apps/epn-discovery/epn-discovery dist/epn-server-linux-x86_64/bin/
          cp build/apps/epn-relay/epn-relay dist/epn-server-linux-x86_64/bin/
          cp build/apps/epn-server/epn-server dist/epn-server-linux-x86_64/bin/
          cp build/apps/epn-tun-server/epn-tun-server dist/epn-server-linux-x86_64/bin/
          cp scripts/install-server.sh dist/epn-server-linux-x86_64/scripts/
          cp scripts/epn-start.sh scripts/epn-setup.sh scripts/epn-teardown.sh dist/epn-server-linux-x86_64/scripts/
          cp README.md dist/epn-server-linux-x86_64/
          tar -C dist -czf epn-server-linux-x86_64-${{ github.ref_name }}.tar.gz epn-server-linux-x86_64

      - name: Package Linux client
        run: |
          set -eux
          mkdir -p dist/epn-client-linux-x86_64/bin
          cp build/apps/epn-client/epn-client dist/epn-client-linux-x86_64/bin/
          cp build/apps/epn-tun-client/epn-tun-client dist/epn-client-linux-x86_64/bin/
          cp build/apps/epn-tun-dev/epn-tun-dev dist/epn-client-linux-x86_64/bin/
          cp README.md dist/epn-client-linux-x86_64/
          tar -C dist -czf epn-client-linux-x86_64-${{ github.ref_name }}.tar.gz epn-client-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: epn-linux-x86_64
          path: |
            epn-server-linux-x86_64-${{ github.ref_name }}.tar.gz
            epn-client-linux-x86_64-${{ github.ref_name }}.tar.gz

  windows-client:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make git curl tar autoconf automake libtool pkg-config mingw-w64 zip

      - name: Build Windows client
        run: bash scripts/build-windows.sh

      - name: Package Windows client
        run: |
          set -eux
          mkdir -p dist/epn-windows-x86_64
          cp build-windows/apps/epn-win-client/epn-win-client.exe dist/epn-windows-x86_64/
          cp apps/epn-win-client/README-WINDOWS.md dist/epn-windows-x86_64/
          cd dist
          zip -r ../epn-windows-x86_64-${{ github.ref_name }}.zip epn-windows-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: epn-windows-x86_64
          path: epn-windows-x86_64-${{ github.ref_name }}.zip

  windows-gui:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: [windows-client]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        shell: bash
        run: |
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

      - name: Download Windows CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: epn-windows-x86_64
          path: cli-artifact

      - name: Publish Windows GUI
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Get-ChildItem cli-artifact -Filter '*.zip' | Select-Object -First 1
          Expand-Archive -LiteralPath $zip.FullName -DestinationPath cli-artifact -Force
          dotnet publish apps/epn-windows-gui/epn-windows-gui.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o dist/epn-windows-gui-x86_64
          Copy-Item cli-artifact/epn-windows-x86_64/epn-win-client.exe dist/epn-windows-gui-x86_64/
          Copy-Item apps/epn-windows-gui/README.md dist/epn-windows-gui-x86_64/README-GUI.md
          Compress-Archive -Path dist/epn-windows-gui-x86_64 -DestinationPath epn-windows-gui-x86_64-${{ github.ref_name }}.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: epn-windows-gui-x86_64
          path: epn-windows-gui-x86_64-${{ github.ref_name }}.zip

  openwrt-client:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

      - name: Install OpenWrt SDK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache curl file gawk gettext git libelf-dev \
            libncurses5-dev libncursesw5-dev libssl-dev python3 python3-distutils rsync \
            subversion swig time unzip wget xsltproc zlib1g-dev zstd

      - name: Build OpenWrt packages
        run: bash scripts/build-openwrt.sh

      - uses: actions/upload-artifact@v4
        with:
          name: epn-openwrt-${{ env.OPENWRT_ARCH }}
          path: epn-openwrt-${{ env.OPENWRT_ARCH }}-${{ github.ref_name }}.tar.gz

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [linux, windows-client, windows-gui, openwrt-client]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: EPN ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
